# =============================================================================
# FSAE Autonomous Vehicle Configuration
# =============================================================================
#
# This file contains all tunable parameters for the autonomous system.
# Adjust these values based on your specific vehicle and track conditions.
#
# IMPORTANT: Measure your vehicle carefully! Incorrect parameters will
# cause poor tracking performance or dangerous behavior.
#

# =============================================================================
# VEHICLE PARAMETERS
# =============================================================================
# These are physical properties of your vehicle. Measure them accurately!

vehicle:
  # Wheelbase: Distance from front axle to rear axle [meters]
  # - 1/10 scale RC cars: typically 0.25 - 0.35 m
  # - Full-size FSAE cars: typically 1.5 - 1.6 m
  wheelbase: 0.30
  
  # Maximum steering angle [radians]
  # - This is the physical limit of your steering mechanism
  # - Measure by turning full lock and measuring the angle
  # - Common values: 0.35 - 0.45 rad (20 - 26 degrees)
  max_steering_angle: 0.40
  
  # Track width: Distance between left and right wheels [meters]
  # - Used for some advanced controllers (not Pure Pursuit)
  track_width: 0.25

# =============================================================================
# SPEED LIMITS
# =============================================================================
# Conservative values recommended for initial testing!

speed:
  # Maximum speed [m/s]
  # - Start low (5 m/s) and increase gradually
  # - 8 m/s ≈ 29 km/h, good for FSAE competition
  max_speed: 8.0
  
  # Minimum speed [m/s]
  # - Used in tight corners and uncertain situations
  # - Don't set too low or the car may stall
  min_speed: 2.0
  
  # Acceleration limits [m/s²]
  # - max_longitudinal_accel: How fast you can speed up
  # - max_longitudinal_decel: How fast you can brake
  # - max_lateral_accel: Cornering grip limit
  max_longitudinal_accel: 4.0
  max_longitudinal_decel: 6.0
  max_lateral_accel: 6.0

# =============================================================================
# PATH PLANNER PARAMETERS
# =============================================================================

path_planner:
  # Lookahead distance [meters]
  # - How far ahead the planner considers cones
  # - Limited by your camera/sensor range
  # - ZED 2i: ~15m for reliable depth
  lookahead_distance: 15.0
  
  # Lookbehind distance [meters]
  # - Include cones slightly behind the vehicle
  # - Helps with robustness at track start
  lookbehind_distance: 2.0
  
  # Maximum triangulation edge length [meters]
  # - Edges longer than this are rejected
  # - Should be slightly larger than track width
  max_edge_length: 8.0
  
  # Minimum edge length [meters]
  # - Edges shorter than this are rejected (noise)
  min_edge_length: 0.5
  
  # Smoothing resolution [meters]
  # - Distance between path points
  # - Smaller = smoother but more computation
  smoothing_resolution: 0.2
  
  # Expected track width [meters]
  # - Used to validate edges
  # - FSAE standard: 3.0 m minimum
  expected_track_width: 3.0
  track_width_tolerance: 1.5
  
  # Minimum cones required per side
  min_cones_per_side: 2
  
  # Minimum detection confidence [0.0 - 1.0]
  cone_confidence_threshold: 0.3
  
  # Planning rate [Hz]
  planning_rate_hz: 20.0

# =============================================================================
# PURE PURSUIT CONTROLLER PARAMETERS
# =============================================================================

pure_pursuit:
  # Lookahead distance parameters
  # - Adaptive: l_d = gain * velocity + min_lookahead
  # - At 5 m/s with gain=0.6: l_d = 0.6*5 + 1.5 = 4.5 m
  min_lookahead: 1.5
  max_lookahead: 6.0
  lookahead_gain: 0.6  # [seconds]
  
  # Speed controller (PID)
  # - Start with low gains and increase gradually
  # - Too high: oscillation, instability
  # - Too low: slow response, large errors
  speed_kp: 2.0
  speed_ki: 0.5
  speed_kd: 0.1
  speed_integral_limit: 5.0
  
  # Curvature feedforward
  # - Anticipates steering from known path curvature
  # - Improves tracking in corners
  # - Set gain to 0 to disable
  use_curvature_feedforward: true
  curvature_ff_gain: 0.8
  
  # Emergency stop distance [meters]
  # - Stop if path ends within this distance
  emergency_stop_distance: 0.5
  
  # Control rate [Hz]
  # - Higher = smoother control, more CPU
  # - 50 Hz is typical for racing applications
  control_rate_hz: 50.0

# =============================================================================
# VISUALIZATION
# =============================================================================

visualization:
  # Publish markers for RViz
  publish_markers: true

# =============================================================================
# SENSOR CONFIGURATION (for reference)
# =============================================================================

sensors:
  # ZED 2i Camera
  camera:
    frame_id: "zed_camera"
    image_topic: "/zed/zed_node/rgb/image_rect_color"
    depth_topic: "/zed/zed_node/depth/depth_registered"
    
  # Note: Cone detector topic is published by your YOLO node
  cones_topic: "/detected_cones"

# =============================================================================
# TUNING GUIDE
# =============================================================================
#
# INITIAL TESTING (Start here!):
#   max_speed: 3.0 m/s
#   min_speed: 1.5 m/s
#   min_lookahead: 2.0 m
#   lookahead_gain: 0.8 s
#   speed_kp: 1.0
#   curvature_ff_gain: 0.5
#
# SYMPTOMS AND FIXES:
#
# Problem: Car oscillates side-to-side
# Solution: Increase min_lookahead, decrease speed_kp
#
# Problem: Car cuts corners
# Solution: Decrease lookahead_gain, decrease curvature_ff_gain
#
# Problem: Car overshoots corners
# Solution: Decrease max_speed, increase max_lateral_accel limit
#
# Problem: Car is sluggish to respond
# Solution: Decrease lookahead_gain, increase speed_kp
#
# Problem: Path looks jagged
# Solution: Decrease smoothing_resolution, check cone detection quality
#
# Problem: Speed fluctuates wildly
# Solution: Decrease speed_kp, increase speed_ki slightly
